name: Load Test - Validate SLA

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Target URL to load test"
        required: true
        default: "http://localhost:8000"
  schedule:
    # Run load test every Sunday at midnight
    - cron: "0 0 * * 0"

jobs:
  load-test:
    name: Run Load Test
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e ".[test]"
          pip install locust

      - name: Start RLaaS service
        env:
          RLAAS_REDIS_HOST: localhost
          RLAAS_REDIS_PORT: 6379
        run: |
          python -m rlaas.main &
          sleep 5
          curl -f http://localhost:8000/health

      - name: Run load test
        run: |
          locust -f scripts/locustfile.py \
            --headless \
            --users 100 \
            --spawn-rate 10 \
            --run-time 60s \
            --host http://localhost:8000 \
            --csv=load-test-results \
            --exit-code-on-error 1

      - name: Validate SLA (p99 < 10ms)
        run: python scripts/validate_sla.py load-test-results_stats.csv

      - name: Upload load test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-results
          path: load-test-results*.csv
