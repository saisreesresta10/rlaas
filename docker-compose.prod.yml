version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: rlaas-redis-prod
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rlaas-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  rlaas:
    build: .
    container_name: rlaas-app-prod
    ports:
      - "8000:8000"
    environment:
      - RLAAS_REDIS_HOST=redis
      - RLAAS_REDIS_PORT=6379
      - RLAAS_SERVER_HOST=0.0.0.0
      - RLAAS_SERVER_PORT=8000
      - RLAAS_SERVER_WORKERS=4
      - RLAAS_METRICS_ENABLED=true
      - RLAAS_REDIS_CIRCUIT_BREAKER_ENABLED=true
      - RLAAS_REDIS_CIRCUIT_BREAKER_FAILURE_THRESHOLD=5
      - RLAAS_REDIS_CIRCUIT_BREAKER_RECOVERY_TIMEOUT=30
      - RLAAS_REDIS_CIRCUIT_BREAKER_TIMEOUT=0.5
      - RLAAS_DEFAULT_RULES_LIMIT=1000
      - RLAAS_DEFAULT_RULES_WINDOW_SECONDS=3600
      - RLAAS_DEFAULT_RULES_BURST=1200
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - rlaas-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
      replicas: 2

volumes:
  redis_data:

networks:
  rlaas-network:
    driver: bridge